<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="2"/>
    </pattern>
    <!-- Soft Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4"/>
  <rect width="1200" height="800" rx="20" fill="url(#grid)" />

  <!-- Mock Browser Header -->
  <rect x="0" y="0" width="1200" height="70" rx="0" fill="#0f172a" />
  <circle cx="30" cy="35" r="6" fill="#ef4444" />
  <circle cx="50" cy="35" r="6" fill="#f59e0b" />
  <circle cx="70" cy="35" r="6" fill="#10b981" />
  <rect x="110" y="20" width="400" height="30" rx="6" fill="#1e293b" />
  <text x="130" y="40" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">fastbooks.in/pilot/bill-to-draft</text>
  <rect x="1050" y="20" width="120" height="30" rx="6" fill="#ea580c" />
  <text x="1110" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PILOT MODE</text>

  <!-- Title / Eyebrow -->
  <text x="600" y="140" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Workflow Proof: Bill Photo → Purchase Draft</text>
  <text x="600" y="175" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Illustrates how supplier invoices are parsed into review-ready purchase drafts with tax breakdowns.</text>

  <!-- Left Side: Invoice Photo Upload -->
  <g transform="translate(80, 220)" filter="url(#shadow)">
    <rect width="440" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="440" height="60" rx="16" fill="#f1f5f9" stroke="none"/>
    <rect x="0" y="40" width="440" height="20" fill="#f1f5f9" stroke="none"/>
    <text x="24" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Captured Supplier Invoice Photo</text>

    <!-- Invoice Doc Mock -->
    <rect x="40" y="90" width="360" height="290" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
    <path d="M 60 130 H 380 M 60 180 H 380 M 60 280 H 380" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Invoice Content -->
    <text x="60" y="120" fill="#0f172a" font-family="monospace" font-size="13" font-weight="bold">INVOICE: ABC TRADERS</text>
    <text x="380" y="120" fill="#0f172a" font-family="monospace" font-size="13" font-weight="bold" text-anchor="end">INV #4501</text>
    
    <text x="60" y="155" fill="#475569" font-family="monospace" font-size="12">Date: 12-May-2026</text>
    <text x="380" y="155" fill="#475569" font-family="monospace" font-size="12" text-anchor="end">GSTIN: 27AAAAA0000A1Z5</text>
    
    <text x="60" y="210" fill="#64748b" font-family="monospace" font-size="12">Item: Electrical Supply items</text>
    <text x="380" y="210" fill="#1e293b" font-family="monospace" font-size="12" text-anchor="end">₹15,677.97</text>

    <text x="60" y="235" fill="#64748b" font-family="monospace" font-size="12">GST 18% (CGST + SGST)</text>
    <text x="380" y="235" fill="#1e293b" font-family="monospace" font-size="12" text-anchor="end">₹2,822.03</text>
    
    <text x="60" y="320" fill="#0f172a" font-family="monospace" font-size="16" font-weight="bold">TOTAL AMOUNT</text>
    <text x="380" y="320" fill="#0f172a" font-family="monospace" font-size="18" font-weight="bold" text-anchor="end">₹18,500.00</text>
  </g>

  <!-- Connector Arrow -->
  <g transform="translate(540, 400)">
    <path d="M 0 0 L 120 0 M 100 -10 L 120 0 L 100 10" fill="none" stroke="#ea580c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="25" y="-30" width="70" height="20" rx="4" fill="#ea580c" />
    <text x="60" y="-16" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">PREPARES</text>
  </g>

  <!-- Right Side: Draft Card in Accountant Review Queue -->
  <g transform="translate(680, 220)" filter="url(#shadow)">
    <rect width="440" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="440" height="60" rx="16" fill="#f8fafc" stroke="none"/>
    <rect x="0" y="40" width="440" height="20" fill="#f8fafc" stroke="none"/>
    <text x="24" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Fastbooks: Purchase Entry Draft</text>
    <rect x="320" y="18" width="96" height="24" rx="6" fill="#fed7aa" />
    <text x="368" y="34" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">NEEDS REVIEW</text>

    <!-- Key-Value Rows -->
    <g transform="translate(24, 80)">
      <!-- Row 1: Party Match -->
      <text x="0" y="30" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Party/Creditor</text>
      <text x="392" y="30" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" text-anchor="end">ABC Traders</text>
      <text x="392" y="50" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" text-anchor="end">✓ Auto-matched from GSTIN</text>
      <line x1="0" y1="65" x2="392" y2="65" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 2: Bill No / Date -->
      <text x="0" y="90" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Invoice No / Date</text>
      <text x="392" y="90" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="end">#4501 | 12-May-2026</text>
      <line x1="0" y1="105" x2="392" y2="105" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 3: Financial Details -->
      <text x="0" y="130" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Taxable / GST Split</text>
      <text x="392" y="130" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">Taxable: ₹15,677.97 | GST: ₹2,822.03</text>
      <text x="392" y="150" fill="#854d0e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" text-anchor="end">GST hint: 18% CGST/SGST Input Credit</text>
      <line x1="0" y1="165" x2="392" y2="165" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 4: Total Amount -->
      <text x="0" y="195" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Total Purchase Value</text>
      <text x="392" y="195" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" text-anchor="end">₹18,500.00</text>
      <line x1="0" y1="215" x2="392" y2="215" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 5: Action Button (Mocked) -->
      <rect x="0" y="240" width="392" height="48" rx="8" fill="#10b981" />
      <text x="196" y="269" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">✓ Approve &amp; Create Voucher</text>
      <text x="196" y="310" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Verify GST treatment and ledger classification before posting</text>
    </g>
  </g>

  <!-- Footer Disclaimer -->
  <rect x="0" y="730" width="1200" height="70" rx="0" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" />
  <text x="600" y="770" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    Placeholder — replace with real Fastbooks screenshot
  </text>
</svg>
