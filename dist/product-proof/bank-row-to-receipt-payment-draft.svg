<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="2"/>
    </pattern>
    <!-- Soft Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4"/>
  <rect width="1200" height="800" rx="20" fill="url(#grid)" />

  <!-- Mock Browser Header -->
  <rect x="0" y="0" width="1200" height="70" rx="0" fill="#0f172a" />
  <circle cx="30" cy="35" r="6" fill="#ef4444" />
  <circle cx="50" cy="35" r="6" fill="#f59e0b" />
  <circle cx="70" cy="35" r="6" fill="#10b981" />
  <rect x="110" y="20" width="400" height="30" rx="6" fill="#1e293b" />
  <text x="130" y="40" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">fastbooks.in/pilot/bank-to-draft</text>
  <rect x="1050" y="20" width="120" height="30" rx="6" fill="#ea580c" />
  <text x="1110" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PILOT MODE</text>

  <!-- Title / Eyebrow -->
  <text x="600" y="140" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Workflow Proof: Bank Statement Row → Receipt/Payment Draft</text>
  <text x="600" y="175" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Displays how bank narrations are mapped to receipt and payment drafts for easy matching.</text>

  <!-- Left Side: Bank Statement -->
  <g transform="translate(80, 220)" filter="url(#shadow)">
    <rect width="440" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="440" height="60" rx="16" fill="#f1f5f9" stroke="none"/>
    <rect x="0" y="40" width="440" height="20" fill="#f1f5f9" stroke="none"/>
    <text x="24" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Bank Statement Rows (Imported)</text>

    <!-- Table Mock -->
    <g transform="translate(20, 80)">
      <rect width="400" height="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
      <text x="10" y="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">DATE</text>
      <text x="90" y="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">NARRATION / DESCRIPTION</text>
      <text x="390" y="20" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" text-anchor="end">AMOUNT</text>

      <!-- Row 1 -->
      <rect y="30" width="400" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <text x="10" y="55" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">12-May</text>
      <text x="90" y="48" fill="#1e293b" font-family="monospace" font-size="12" font-weight="bold">UPI/CR/RAJ ELEC/9021</text>
      <text x="90" y="68" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">UPI Collection Inward</text>
      <text x="390" y="55" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="end">₹18,600.00 Cr</text>

      <!-- Row 2: Selected Row -->
      <rect y="90" width="400" height="70" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
      <text x="10" y="120" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">14-May</text>
      <text x="90" y="115" fill="#0f172a" font-family="monospace" font-size="12" font-weight="bold">NEFT SHARMA TRADERS CR</text>
      <text x="90" y="135" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Selected for Preparation</text>
      <text x="390" y="120" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" text-anchor="end">₹85,000.00 Cr</text>

      <!-- Row 3 -->
      <rect y="160" width="400" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <text x="10" y="185" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">15-May</text>
      <text x="90" y="178" fill="#1e293b" font-family="monospace" font-size="12" font-weight="bold">IMPS/DR/GUPTA MOTORS</text>
      <text x="90" y="198" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Vendor Outward Payment</text>
      <text x="390" y="185" fill="#991b1b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="end">₹12,500.00 Dr</text>

      <!-- Row 4 -->
      <rect y="220" width="400" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <text x="10" y="245" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">16-May</text>
      <text x="90" y="238" fill="#1e293b" font-family="monospace" font-size="12" font-weight="bold">BANK CHARGES / GST</text>
      <text x="90" y="258" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Automatic Bank Debit</text>
      <text x="390" y="245" fill="#991b1b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="end">₹177.00 Dr</text>
    </g>
  </g>

  <!-- Connector Arrow -->
  <g transform="translate(540, 400)">
    <path d="M 0 0 L 120 0 M 100 -10 L 120 0 L 100 10" fill="none" stroke="#ea580c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="25" y="-30" width="70" height="20" rx="4" fill="#ea580c" />
    <text x="60" y="-16" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">PREPARES</text>
  </g>

  <!-- Right Side: Prepared Receipt Draft -->
  <g transform="translate(680, 220)" filter="url(#shadow)">
    <rect width="440" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="440" height="60" rx="16" fill="#f8fafc" stroke="none"/>
    <rect x="0" y="40" width="440" height="20" fill="#f8fafc" stroke="none"/>
    <text x="24" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Fastbooks: Prepared Receipt Voucher</text>
    <rect x="320" y="18" width="96" height="24" rx="6" fill="#fed7aa" />
    <text x="368" y="34" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">NEEDS REVIEW</text>

    <!-- Key-Value Rows -->
    <g transform="translate(24, 80)">
      <!-- Row 1: Amount -->
      <text x="0" y="30" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Amount Received</text>
      <text x="392" y="30" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" text-anchor="end">₹85,000.00</text>
      <line x1="0" y1="45" x2="392" y2="45" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 2: Suggested Ledger (Credit) -->
      <text x="0" y="75" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Suggested Party (CR)</text>
      <text x="392" y="75" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="end">Sharma Traders</text>
      <text x="392" y="95" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" text-anchor="end">✓ Suggested based on NEFT row text</text>
      <line x1="0" y1="110" x2="392" y2="110" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 3: Account (Debit) -->
      <text x="0" y="140" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Received In (DR)</text>
      <text x="392" y="140" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="end">HDFC Current Account</text>
      <line x1="0" y1="155" x2="392" y2="155" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 4: Outstanding Match suggestion -->
      <text x="0" y="185" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Suggested Invoice Match</text>
      <text x="392" y="185" fill="#854d0e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="end">INV-26-08 (O/S Balance: ₹85,000)</text>
      <line x1="0" y1="205" x2="392" y2="205" stroke="#f1f5f9" stroke-width="1.5"/>

      <!-- Row 5: Action Button (Mocked) -->
      <rect x="0" y="240" width="392" height="48" rx="8" fill="#10b981" />
      <text x="196" y="269" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">✓ Approve &amp; Clear Outstanding</text>
      <text x="196" y="310" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Bank statement row mapped as draft. Account team verifies.</text>
    </g>
  </g>

  <!-- Footer Disclaimer -->
  <rect x="0" y="730" width="1200" height="70" rx="0" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" />
  <text x="600" y="770" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    Placeholder — replace with real Fastbooks screenshot
  </text>
</svg>
