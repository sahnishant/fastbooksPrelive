<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="2"/>
    </pattern>
    <!-- Soft Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4"/>
  <rect width="1200" height="800" rx="20" fill="url(#grid)" />

  <!-- Mock Browser Header -->
  <rect x="0" y="0" width="1200" height="70" rx="0" fill="#0f172a" />
  <circle cx="30" cy="35" r="6" fill="#ef4444" />
  <circle cx="50" cy="35" r="6" fill="#f59e0b" />
  <circle cx="70" cy="35" r="6" fill="#10b981" />
  <rect x="110" y="20" width="400" height="30" rx="6" fill="#1e293b" />
  <text x="130" y="40" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">fastbooks.in/pilot/gst-hints</text>
  <rect x="1050" y="20" width="120" height="30" rx="6" fill="#ea580c" />
  <text x="1110" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PILOT MODE</text>

  <!-- Title / Eyebrow -->
  <text x="600" y="140" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Workflow Proof: GST &amp; Ledger Hints Review</text>
  <text x="600" y="175" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" text-anchor="middle">GST rates, party verifications, and ledger classes stay reviewable rather than being auto-posted.</text>

  <!-- Left Side: GST Registry Match Details -->
  <g transform="translate(80, 220)" filter="url(#shadow)">
    <rect width="440" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="440" height="60" rx="16" fill="#f1f5f9" stroke="none"/>
    <rect x="0" y="40" width="440" height="20" fill="#f1f5f9" stroke="none"/>
    <text x="24" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">GSTIN Validation &amp; Tax Split</text>

    <!-- GST Details List -->
    <g transform="translate(24, 80)">
      <!-- Box 1 -->
      <rect width="392" height="70" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
      <text x="16" y="26" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" text-transform="uppercase">Scanned Supplier GSTIN</text>
      <text x="16" y="48" fill="#ea580c" font-family="monospace" font-size="15" font-weight="bold">27AAAAA0000A1Z5</text>
      <text x="376" y="48" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" text-anchor="end">Active (Registry Match)</text>

      <!-- Box 2 -->
      <rect y="85" width="392" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="16" y="111" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" text-transform="uppercase">Tax Treatment (Intra-state)</text>
      <text x="16" y="133" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">CGST 9% (₹1,411.02) + SGST 9% (₹1,411.02)</text>
      <text x="376" y="133" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="end">18% Rate</text>

      <!-- Box 3 -->
      <rect y="170" width="392" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="16" y="196" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" text-transform="uppercase">Suggested Ledger Group</text>
      <text x="16" y="218" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Purchase Accounts / Electrical Purchases</text>

      <!-- Warning info -->
      <rect y="255" width="392" height="110" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
      <text x="16" y="280" fill="#991b1b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" text-transform="uppercase">Ledger &amp; Registry Alert</text>
      <text x="16" y="305" fill="#7f1d1d" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">GST Portal legal name: "Sharma Traders Private Limited"</text>
      <text x="16" y="325" fill="#7f1d1d" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Selected Ledger name: "Sharma Traders"</text>
      <text x="16" y="345" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">Difference found. Accountant review recommended.</text>
    </g>
  </g>

  <!-- Connector Arrow -->
  <g transform="translate(540, 400)">
    <path d="M 0 0 L 120 0 M 100 -10 L 120 0 L 100 10" fill="none" stroke="#ea580c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="25" y="-30" width="70" height="20" rx="4" fill="#ea580c" />
    <text x="60" y="-16" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">PREPARES</text>
  </g>

  <!-- Right Side: Action Interface for Review -->
  <g transform="translate(680, 220)" filter="url(#shadow)">
    <rect width="440" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="440" height="60" rx="16" fill="#f8fafc" stroke="none"/>
    <rect x="0" y="40" width="440" height="20" fill="#f8fafc" stroke="none"/>
    <text x="24" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Fastbooks: Action Resolution Panel</text>
    <rect x="320" y="18" width="96" height="24" rx="6" fill="#fef9c3" />
    <text x="368" y="34" fill="#854d0e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">GST HINTS</text>

    <!-- Key-Value Rows -->
    <g transform="translate(24, 80)">
      <text x="0" y="25" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Decision Required: Party Name Mismatch</text>
      
      <!-- Option A -->
      <g transform="translate(0, 45)">
        <rect width="392" height="60" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
        <circle cx="25" cy="30" r="8" fill="none" stroke="#ea580c" stroke-width="2"/>
        <circle cx="25" cy="30" r="4" fill="#ea580c"/>
        <text x="50" y="28" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Option A: Link to "Sharma Traders" (Existing)</text>
        <text x="50" y="46" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Keeps current accounting ledger name active</text>
      </g>

      <!-- Option B -->
      <g transform="translate(0, 120)">
        <rect width="392" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
        <circle cx="25" cy="30" r="8" fill="none" stroke="#64748b" stroke-width="2"/>
        <text x="50" y="28" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Option B: Rename Ledger to match GST Portal</text>
        <text x="50" y="46" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Renames "Sharma Traders" to "Sharma Traders Pvt Ltd"</text>
      </g>

      <!-- Option C -->
      <g transform="translate(0, 195)">
        <rect width="392" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
        <circle cx="25" cy="30" r="8" fill="none" stroke="#64748b" stroke-width="2"/>
        <text x="50" y="28" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Option C: Create New Party Ledger</text>
        <text x="50" y="46" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Creates a brand new supplier ledger account</text>
      </g>

      <!-- Save buttons -->
      <rect x="0" y="275" width="392" height="48" rx="8" fill="#10b981" />
      <text x="196" y="304" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">✓ Confirm Decision &amp; Update Draft</text>
      <text x="196" y="342" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">AI provides tax &amp; party hints; final decision stays human</text>
    </g>
  </g>

  <!-- Footer Disclaimer -->
  <rect x="0" y="730" width="1200" height="70" rx="0" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" />
  <text x="600" y="770" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    Placeholder — replace with real Fastbooks screenshot
  </text>
</svg>
