<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="2"/>
    </pattern>
    <!-- Soft Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4"/>
  <rect width="1200" height="800" rx="20" fill="url(#grid)" />

  <!-- Mock Browser Header -->
  <rect x="0" y="0" width="1200" height="70" rx="0" fill="#0f172a" />
  <circle cx="30" cy="35" r="6" fill="#ef4444" />
  <circle cx="50" cy="35" r="6" fill="#f59e0b" />
  <circle cx="70" cy="35" r="6" fill="#10b981" />
  <rect x="110" y="20" width="400" height="30" rx="6" fill="#1e293b" />
  <text x="130" y="40" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">fastbooks.in/pilot/review-inbox</text>
  <rect x="1050" y="20" width="120" height="30" rx="6" fill="#ea580c" />
  <text x="1110" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PILOT MODE</text>

  <!-- Title / Eyebrow -->
  <text x="600" y="140" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Workflow Proof: Review Inbox &amp; Accountant Approval</text>
  <text x="600" y="175" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" text-anchor="middle">A queue where prepared entries wait for the accountant to approve, adjust or reject before posting.</text>

  <!-- Main Workspace Area -->
  <g transform="translate(80, 220)" filter="url(#shadow)">
    <!-- Container Card -->
    <rect width="1040" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="1040" height="65" rx="16" fill="#f8fafc" stroke="none"/>
    <rect x="0" y="45" width="1040" height="20" fill="#f8fafc" stroke="none"/>
    <line x1="0" y1="65" x2="1040" y2="65" stroke="#e2e8f0" stroke-width="2"/>

    <!-- Review Inbox Header -->
    <text x="24" y="38" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800">Accountant Review Queue (5 Drafts Pending)</text>

    <!-- Queue Rows -->
    <g transform="translate(24, 85)">
      
      <!-- Entry 1: Voice Note Expense -->
      <g transform="translate(0, 0)">
        <rect width="992" height="85" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
        <rect x="15" y="20" width="45" height="45" rx="6" fill="#ffedd5"/>
        <text x="37" y="47" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" text-anchor="middle">EXP</text>
        
        <text x="75" y="38" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Office Stationery (Printer paper)</text>
        <text x="75" y="60" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="13">Source: Voice capture from Staff | Paid from: Cash</text>

        <rect x="420" y="30" width="110" height="24" rx="12" fill="#fed7aa"/>
        <text x="475" y="46" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">VOICE HINT</text>

        <text x="720" y="48" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" text-anchor="end">₹1,250.00</text>
        
        <rect x="760" y="22" width="100" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
        <text x="810" y="46" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Edit</text>

        <rect x="875" y="22" width="100" height="40" rx="8" fill="#10b981" />
        <text x="925" y="46" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">✓ Approve</text>
      </g>

      <!-- Entry 2: Bank Statement Row NEFT -->
      <g transform="translate(0, 105)">
        <rect width="992" height="85" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
        <rect x="15" y="20" width="45" height="45" rx="6" fill="#dcfce7"/>
        <text x="37" y="47" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" text-anchor="middle">REC</text>
        
        <text x="75" y="38" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Sharma Traders (Customer NEFT Receipt)</text>
        <text x="75" y="60" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="13">Source: Bank row import | Clears: INV-26-08 (suggested match)</text>

        <rect x="420" y="30" width="110" height="24" rx="12" fill="#dcfce7"/>
        <text x="475" y="46" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">BANK MATCH</text>

        <text x="720" y="48" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" text-anchor="end">₹85,000.00</text>
        
        <rect x="760" y="22" width="100" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
        <text x="810" y="46" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Edit</text>

        <rect x="875" y="22" width="100" height="40" rx="8" fill="#10b981" />
        <text x="925" y="46" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">✓ Approve</text>
      </g>

      <!-- Entry 3: Supplier Bill Purchase -->
      <g transform="translate(0, 210)">
        <rect width="992" height="85" rx="8" fill="#fffbeb" stroke="#fef3c7" stroke-width="1.5"/>
        <rect x="15" y="20" width="45" height="45" rx="6" fill="#fef9c3"/>
        <text x="37" y="47" fill="#854d0e" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" text-anchor="middle">PUR</text>
        
        <text x="75" y="38" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">ABC Traders (Supplier Purchase Bill)</text>
        <text x="75" y="60" fill="#854d0e" font-family="system-ui, -apple-system, sans-serif" font-size="13">Source: Photo Upload | GST 18% CGST/SGST Input Suggestion needs tax confirmation</text>

        <rect x="420" y="30" width="110" height="24" rx="12" fill="#fef9c3"/>
        <text x="475" y="46" fill="#854d0e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" text-anchor="middle">GST REVIEW</text>

        <text x="720" y="48" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" text-anchor="end">₹18,500.00</text>
        
        <rect x="760" y="22" width="100" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
        <text x="810" y="46" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Edit</text>

        <rect x="875" y="22" width="100" height="40" rx="8" fill="#ea580c" />
        <text x="925" y="46" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Resolve</text>
      </g>
    </g>
  </g>

  <!-- Footer Disclaimer -->
  <rect x="0" y="730" width="1200" height="70" rx="0" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" />
  <text x="600" y="770" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    Placeholder — replace with real Fastbooks screenshot
  </text>
</svg>
