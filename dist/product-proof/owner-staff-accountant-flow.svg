<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="2"/>
    </pattern>
    <!-- Soft Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4"/>
  <rect width="1200" height="800" rx="20" fill="url(#grid)" />

  <!-- Mock Browser Header -->
  <rect x="0" y="0" width="1200" height="70" rx="0" fill="#0f172a" />
  <circle cx="30" cy="35" r="6" fill="#ef4444" />
  <circle cx="50" cy="35" r="6" fill="#f59e0b" />
  <circle cx="70" cy="35" r="6" fill="#10b981" />
  <rect x="110" y="20" width="400" height="30" rx="6" fill="#1e293b" />
  <text x="130" y="40" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">fastbooks.in/pilot/collaboration-flow</text>
  <rect x="1050" y="20" width="120" height="30" rx="6" fill="#ea580c" />
  <text x="1110" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PILOT MODE</text>

  <!-- Title / Eyebrow -->
  <text x="600" y="140" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Workflow Proof: Owner, Staff &amp; Accountant Collaboration</text>
  <text x="600" y="175" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Demonstrates the division of labor: capture on-site, draft automatically, verify at the desk.</text>

  <!-- Flow Steps Layout (Three Columns) -->
  <g transform="translate(60, 220)">
    
    <!-- Step 1: Staff Capture -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <rect width="320" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect width="320" height="60" rx="16" fill="#ffedd5" stroke="none"/>
      <rect x="0" y="40" width="320" height="20" fill="#ffedd5" stroke="none"/>
      <text x="160" y="36" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" text-anchor="middle">1. INPUT: STAFF CAPTURE</text>
      
      <!-- Phone Mock Graphic -->
      <rect x="100" y="80" width="120" height="190" rx="12" fill="#1e293b" stroke="#cbd5e1" stroke-width="3" />
      <rect x="108" y="100" width="104" height="150" rx="6" fill="#ffffff" />
      <!-- Waveform mock inside screen -->
      <path d="M 120 175 L 200 175 M 130 175 L 130 160 M 140 175 L 140 150 M 150 175 L 150 185 M 160 175 L 160 145 M 170 175 L 170 190 M 180 175 L 180 165 M 190 175 L 190 170" stroke="#ea580c" stroke-width="2" />
      <circle cx="160" cy="225" r="14" fill="#ef4444" />
      <text x="160" y="240" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="900" text-anchor="middle">REC</text>

      <text x="160" y="300" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Fast, On-the-Go Context</text>
      <text x="24" y="335" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">
        <tspan x="160" dy="0" text-anchor="middle">Staff uploads bill photos,</tspan>
        <tspan x="160" dy="18" text-anchor="middle">receipts, bank statements,</tspan>
        <tspan x="160" dy="18" text-anchor="middle">or voice notes directly via phone.</tspan>
      </text>
    </g>

    <!-- Arrow 1-2 -->
    <g transform="translate(320, 200)">
      <path d="M 10 10 L 40 10 M 30 0 L 40 10 L 30 20" fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Step 2: AI Preparation -->
    <g transform="translate(380, 0)" filter="url(#shadow)">
      <rect width="320" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect width="320" height="60" rx="16" fill="#f8fafc" stroke="none"/>
      <rect x="0" y="40" width="320" height="20" fill="#f8fafc" stroke="none"/>
      <text x="160" y="36" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" text-anchor="middle">2. PREPARE: FASTBOOKS AI</text>

      <!-- Processing Engine Graphic -->
      <g transform="translate(85, 90)">
        <rect width="150" height="170" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
        <circle cx="75" cy="55" r="28" fill="#ffedd5" stroke="#fed7aa" stroke-width="2" />
        <text x="75" y="61" fill="#ea580c" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" text-anchor="middle">AI</text>
        
        <rect x="15" y="105" width="120" height="15" rx="4" fill="#e2e8f0" />
        <rect x="15" y="105" width="80" height="15" rx="4" fill="#ea580c" />
        <text x="75" y="116" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" text-anchor="middle">PARSING IN PROGRESS</text>
        
        <text x="15" y="145" fill="#475569" font-family="monospace" font-size="10" font-weight="bold">✓ Party match: Active</text>
        <text x="15" y="158" fill="#475569" font-family="monospace" font-size="10" font-weight="bold">✓ GST hint: Prepared</text>
      </g>

      <text x="160" y="300" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Draft Entry Generation</text>
      <text x="24" y="335" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">
        <tspan x="160" dy="0" text-anchor="middle">Parses transaction amounts,</tspan>
        <tspan x="160" dy="18" text-anchor="middle">suggests party ledgers, and</tspan>
        <tspan x="160" dy="18" text-anchor="middle">prepares draft GST allocations.</tspan>
      </text>
    </g>

    <!-- Arrow 2-3 -->
    <g transform="translate(700, 200)">
      <path d="M 10 10 L 40 10 M 30 0 L 40 10 L 30 20" fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Step 3: Accountant Approval -->
    <g transform="translate(760, 0)" filter="url(#shadow)">
      <rect width="320" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect width="320" height="60" rx="16" fill="#dcfce7" stroke="none"/>
      <rect x="0" y="40" width="320" height="20" fill="#dcfce7" stroke="none"/>
      <text x="160" y="36" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" text-anchor="middle">3. APPROVAL: ACCOUNTANT</text>

      <!-- Desktop Review Queue Graphic -->
      <g transform="translate(85, 90)">
        <rect width="150" height="130" rx="8" fill="#1e293b" />
        <rect x="10" y="10" width="130" height="95" rx="4" fill="#ffffff" />
        <!-- Screen details -->
        <line x1="20" y1="25" x2="130" y2="25" stroke="#10b981" stroke-width="4" />
        <line x1="20" y1="40" x2="110" y2="40" stroke="#e2e8f0" stroke-width="3" />
        <line x1="20" y1="55" x2="120" y2="55" stroke="#e2e8f0" stroke-width="3" />
        <circle cx="115" cy="85" r="10" fill="#10b981" />
        <text x="115" y="88" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="950" text-anchor="middle">✓</text>
        
        <!-- Stand -->
        <rect x="65" y="130" width="20" height="30" fill="#475569" />
        <ellipse cx="75" cy="160" rx="35" ry="8" fill="#475569" />
      </g>

      <text x="160" y="300" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Human-in-the-Loop Review</text>
      <text x="24" y="335" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">
        <tspan x="160" dy="0" text-anchor="middle">Accountant has ultimate control.</tspan>
        <tspan x="160" dy="18" text-anchor="middle">Verifies tax splits, adjusts party</tspan>
        <tspan x="160" dy="18" text-anchor="middle">ledgers, and approves entry posting.</tspan>
      </text>
    </g>
  </g>

  <!-- Footer Disclaimer -->
  <rect x="0" y="730" width="1200" height="70" rx="0" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" />
  <text x="600" y="770" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    Placeholder — replace with real Fastbooks screenshot
  </text>
</svg>
